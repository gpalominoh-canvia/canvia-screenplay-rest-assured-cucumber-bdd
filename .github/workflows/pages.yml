name: Publicar reportes (GitHub Pages)

# Ejecuta las pruebas y publica los reportes Serenity + Allure en GitHub Pages.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

# Permisos necesarios para desplegar en Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Un solo despliegue a la vez.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Permisos al wrapper
        run: chmod +x ./gradlew

      - name: Ejecutar pruebas
        run: ./gradlew clean test
        continue-on-error: true

      - name: Generar reporte Allure
        if: always()
        run: ./gradlew allureReport

      - name: Preparar sitio (índice + reportes)
        if: always()
        run: |
          mkdir -p public
          cp -r target/site/serenity public/serenity || true
          cp -r build/reports/allure-report public/allure || true
          cat > public/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
          <head>
            <meta charset="utf-8">
            <meta name="viewport" content="width=device-width, initial-scale=1">
            <title>Reportes · canvia-screenplay-rest-assured-cucumber-bdd</title>
            <style>
              body{font-family:system-ui,Segoe UI,Roboto,sans-serif;margin:0;background:#0d1117;color:#e6edf3}
              .wrap{max-width:680px;margin:6vh auto;padding:0 1.5rem}
              h1{font-size:1.6rem} p{color:#8b949e}
              a.card{display:block;padding:1.25rem 1.5rem;margin:.75rem 0;border:1px solid #30363d;
                     border-radius:12px;text-decoration:none;color:#58a6ff;background:#161b22;transition:.15s}
              a.card:hover{border-color:#58a6ff;transform:translateY(-2px)}
              small{color:#8b949e}
            </style>
          </head>
          <body><div class="wrap">
            <h1>Reportes de pruebas</h1>
            <p>Curso Screenplay + REST Assured + Cucumber (BDD)</p>
            <a class="card" href="serenity/index.html">📊 Reporte Serenity BDD<br><small>Reporte viviente con detalle REST</small></a>
            <a class="card" href="allure/index.html">📈 Reporte Allure<br><small>Dashboard con severidad e historial</small></a>
          </div></body>
          </html>
          HTML

      - name: Subir artefacto de Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Desplegar en Pages
        id: deployment
        if: always()
        uses: actions/deploy-pages@v4
