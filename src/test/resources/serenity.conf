# Configuración de Serenity (formato HOCON).
# Aquí centralizamos URLs y ajustes para no hardcodearlos en el código.

serenity {
  # Nombre del proyecto que aparece en el reporte.
  project.name = "Canvia - Screenplay REST Assured Cucumber BDD"
  # Registra cada llamada REST (request/response) en el reporte.
  restquery.record.enabled = true
  # Toma el detalle aunque la prueba pase (útil para auditar el contrato).
  report.show.step.details = true
}

# URL base de la API objetivo del curso.
restapi {
  baseUrl = "https://restful-booker.herokuapp.com"
}

# --- Environments (Módulo 9) -------------------------------------------------
# Permite cambiar de entorno con un solo flag:
#   .\gradlew.bat test -Denvironment=staging
# El bloque `default` se usa cuando no se especifica `environment`.
environment = default

environments {
  default {
    restapi.baseUrl = "https://restful-booker.herokuapp.com"
  }
  staging {
    # En un proyecto real apuntaría a tu entorno de staging.
    restapi.baseUrl = "https://restful-booker.herokuapp.com"
  }
  production {
    restapi.baseUrl = "https://restful-booker.herokuapp.com"
  }
}
